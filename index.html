<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quevix</title>
<style>
body{font-family:Arial;background:#667eea;color:#000}
.hidden{display:none}
.btn{padding:12px;border:none;border-radius:8px;background:#111827;color:#fff}
</style>
</head>
<body>

<h2>Quevix Queue</h2>

<div id="joinSection">
<input id="name" placeholder="Enter name">
<button class="btn" onclick="join()">Join</button>
</div>

<div id="statusSection" class="hidden">
<p id="statusText"></p>
<button class="btn" onclick="resetApp()">Join Again</button>
</div>

<script>
let polling=null;

function join(){
 document.getElementById('joinSection').classList.add('hidden');
 document.getElementById('statusSection').classList.remove('hidden');
 document.getElementById('statusText').innerText="You joined queue";
 startPolling();
}

function startPolling(){
 polling=setInterval(()=>{
   console.log("polling...");
 },3000);
}

function stopPolling(){
 if(polling){
  clearInterval(polling);
  polling=null;
 }
}

function resetApp(){
 stopPolling();
 document.getElementById('statusSection').classList.add('hidden');
 document.getElementById('joinSection').classList.remove('hidden');
 document.getElementById('name').value="";
}
</script>

</body>
</html>
